
on:
  schedule:
    # UTC 时间 23:30，即北京时间每天早上 07:30 触发
    - cron: '0 22 * * *'
  workflow_dispatch: # 保留手动触发按钮，方便调试

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Weather Script
        # 在运行步骤中，将 GitHub Secrets 注入为 Node.js 的环境变量
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          SERVER_CHAN_SENDKEY: ${{ secrets.SERVER_CHAN_SENDKEY }}
        run: node deepseek_tianqi.js
